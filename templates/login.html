<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HireVion · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00d4ff;--indigo:#6366f1;--violet:#8b5cf6;
  --text:#e2e8f0;--muted:#94a3b8;--err:#f87171;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);position:relative}

/* ANIMATED BG */
.bg{position:fixed;inset:0;z-index:0;background:#050810;overflow:hidden}

/* Gradient orbs */
.bg-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(90px)}
.bg-orb1{width:600px;height:600px;top:-200px;left:-200px;background:rgba(99,102,241,0.14);animation:orbDrift1 20s ease-in-out infinite alternate}
.bg-orb2{width:500px;height:500px;bottom:-180px;right:-150px;background:rgba(0,212,255,0.1);animation:orbDrift2 16s ease-in-out infinite alternate}
.bg-orb3{width:380px;height:380px;top:40%;right:20%;background:rgba(139,92,246,0.08);animation:orbDrift3 24s ease-in-out infinite alternate}
@keyframes orbDrift1{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,50px) scale(1.12)}}
@keyframes orbDrift2{from{transform:translate(0,0)}to{transform:translate(-55px,-45px)}}
@keyframes orbDrift3{from{transform:translate(0,0)}to{transform:translate(-40px,60px)}}

/* Floating particles */
.login-particles{position:absolute;inset:0;pointer-events:none}
.lp{position:absolute;border-radius:50%;animation:lpDrift linear infinite;opacity:0}
@keyframes lpDrift{0%{opacity:0;transform:translateY(110vh) scale(0)}8%{opacity:0.7}92%{opacity:0.2}100%{opacity:0;transform:translateY(-8vh) scale(1.2)}}

/* Moving lines */
.moving-lines{position:absolute;inset:0;pointer-events:none}
.mline{position:absolute;width:1px;animation:mlineFall linear infinite;opacity:0}
@keyframes mlineFall{0%{opacity:0;transform:translateY(-120%)}15%{opacity:0.6}85%{opacity:0.15}100%{opacity:0;transform:translateY(220%)}}

/* 3D Cubes */
.cube-wrap{position:absolute;perspective:380px;pointer-events:none}
.cube-wrap1{width:80px;height:80px;top:8%;left:5%;opacity:.13;animation:cubeFloat1 18s ease-in-out infinite alternate}
.cube-wrap2{width:60px;height:60px;bottom:10%;right:6%;opacity:.11;animation:cubeFloat2 22s ease-in-out infinite alternate}
.cube-wrap3{width:48px;height:48px;top:55%;left:7%;opacity:.09;animation:cubeFloat3 26s ease-in-out infinite alternate}
@keyframes cubeFloat1{0%{transform:translateY(0)}100%{transform:translateY(-22px)}}
@keyframes cubeFloat2{0%{transform:translateY(0)}100%{transform:translateY(-18px)}}
@keyframes cubeFloat3{0%{transform:translateY(0)}100%{transform:translateY(-14px)}}
.cube-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:cubeRot1 20s linear infinite}
.cube-inner2{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:cubeRot2 28s linear infinite}
.cube-inner3{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:cubeRot3 34s linear infinite}
@keyframes cubeRot1{from{transform:rotateX(15deg) rotateY(0deg) rotateZ(5deg)}to{transform:rotateX(15deg) rotateY(360deg) rotateZ(5deg)}}
@keyframes cubeRot2{from{transform:rotateX(-10deg) rotateY(0deg) rotateZ(-8deg)}to{transform:rotateX(-10deg) rotateY(-360deg) rotateZ(-8deg)}}
@keyframes cubeRot3{from{transform:rotateX(25deg) rotateY(0deg)}to{transform:rotateX(25deg) rotateY(360deg)}}
.cube-face{position:absolute}

/* Floating gradient blobs */
.blob{position:absolute;border-radius:50%;pointer-events:none;mix-blend-mode:screen;opacity:0.07;animation:blobPulse ease-in-out infinite alternate}
.blob1{width:200px;height:200px;top:5%;right:10%;background:radial-gradient(circle,#00d4ff,transparent 70%);animation-duration:12s}
.blob2{width:160px;height:160px;bottom:12%;left:10%;background:radial-gradient(circle,#8b5cf6,transparent 70%);animation-duration:15s}
.blob3{width:120px;height:120px;top:45%;right:5%;background:radial-gradient(circle,#6366f1,transparent 70%);animation-duration:19s}
@keyframes blobPulse{0%{transform:scale(1);opacity:0.07}100%{transform:scale(1.4);opacity:0.13}}

/* Dot grid removed — dot constellation instead */
.dot-field{position:absolute;inset:0;pointer-events:none}
.df{position:absolute;width:2px;height:2px;border-radius:50%;background:#00d4ff;animation:dfPulse ease-in-out infinite alternate}
@keyframes dfPulse{0%{opacity:0.08;transform:scale(1)}100%{opacity:0.35;transform:scale(1.8)}}


/* LAYOUT */
.page{position:relative;z-index:1;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:1rem}

/* GLASS CARD */
.glass-card{
  width:100%;max-width:400px;
  padding:1.8rem 2rem;
  border-radius:24px;
  background:rgba(10,14,30,0.52);
  backdrop-filter:blur(32px) saturate(160%);
  -webkit-backdrop-filter:blur(32px) saturate(160%);
  border:1px solid rgba(255,255,255,0.07);
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.07) inset,
    0 0 1px rgba(255,255,255,0.04) inset,
    0 20px 60px rgba(0,0,0,0.55),
    0 0 100px rgba(99,102,241,0.09);
  position:relative;overflow:hidden;
  animation:cardIn .8s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.glass-card::before{content:'';position:absolute;inset:0;border-radius:24px;pointer-events:none;
  background:linear-gradient(135deg,rgba(0,212,255,0.06) 0%,transparent 45%,rgba(139,92,246,0.05) 100%)}
/* Glowing top edge */
.glass-card::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);pointer-events:none}

/* LOGO */
.logo-row{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1.2rem}
.logo-mark{width:44px;height:44px;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(0,212,255,0.55))}
.logo-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.75rem;font-weight:700;letter-spacing:.02em;
  background:linear-gradient(135deg,#00d4ff 0%,#a78bfa 60%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;position:relative}
.logo-name::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,rgba(0,212,255,0.6),rgba(139,92,246,0.4),transparent)}

.card-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.25rem;font-weight:700;color:var(--text);
  text-align:center;margin-bottom:.28rem}
.card-sub{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:1.2rem}

/* TABS */
.tabs{display:flex;gap:.2rem;margin-bottom:1rem;
  background:rgba(255,255,255,0.04);border-radius:11px;padding:.22rem}
.tab-btn{flex:1;padding:.35rem;border-radius:8px;border:1px solid transparent;background:transparent;
  color:var(--muted);font-size:.82rem;font-weight:500;cursor:pointer;
  transition:all .22s;font-family:'Inter',system-ui,sans-serif;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.tab-btn:hover{border-color:rgba(0,212,255,0.15);background:rgba(255,255,255,0.04);color:var(--text)}
.tab-btn.active{background:rgba(0,212,255,0.1);color:var(--cyan);
  border:1px solid rgba(0,212,255,0.3);
  box-shadow:0 0 18px rgba(0,212,255,0.15),inset 0 1px 0 rgba(255,255,255,0.08)}

/* ERROR */
.error-box{padding:.65rem 1rem;border-radius:9px;margin-bottom:1.2rem;
  background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.22);
  color:#fca5a5;font-size:.8rem;display:flex;align-items:center;gap:.5rem}

/* FORM */
.form-group{margin-bottom:.6rem}
label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem}
input[type="text"],input[type="password"]{
  width:100%;padding:.55rem .85rem;border-radius:9px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);
  color:var(--text);font-size:.87rem;font-family:'Inter',system-ui,sans-serif;
  outline:none;transition:all .25s}
input:focus{border-color:rgba(0,212,255,0.44);background:rgba(0,212,255,0.04);
  box-shadow:0 0 0 3px rgba(0,212,255,0.09)}
input::placeholder{color:#475569;font-size:.83rem}

.btn-submit{width:100%;padding:.6rem;border-radius:10px;border:1px solid rgba(0,212,255,0.35);
  background:rgba(0,212,255,0.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;font-size:.9rem;font-weight:600;letter-spacing:.02em;
  cursor:pointer;transition:all .3s;font-family:'Inter',system-ui,sans-serif;
  box-shadow:0 4px 24px rgba(0,212,255,0.15),inset 0 1px 0 rgba(255,255,255,0.1);
  margin-top:.4rem;position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,0.18),rgba(99,102,241,0.12));opacity:0;transition:.3s}
.btn-submit:hover{transform:translateY(-2px);
  border-color:rgba(0,212,255,0.65);
  box-shadow:0 8px 32px rgba(0,212,255,0.3),inset 0 1px 0 rgba(255,255,255,0.15)}
.btn-submit:hover::before{opacity:1}
.btn-submit:active{transform:translateY(0)}

.back-link{display:block;text-align:center;margin-top:.8rem;font-size:.75rem;
  color:#475569;text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--cyan)}

.features-strip{display:flex;gap:.35rem;margin-top:.9rem;justify-content:center;flex-wrap:wrap}
.feat-pill{padding:.18rem .6rem;border-radius:6px;font-size:.64rem;font-weight:600;
  font-family:'JetBrains Mono',monospace;
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);color:rgba(0,212,255,0.65)}
</style>
</head>

<div class="page">
  <div class="glass-card">
    <div class="logo-row">
      <svg class="logo-mark" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
          <linearGradient id="lg2" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#00d4ff"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Hexagon background -->
        <path d="M22 2 L38 11.5 L38 32.5 L22 42 L6 32.5 L6 11.5 Z" fill="url(#lg1)" opacity="0.15" stroke="url(#lg1)" stroke-width="1"/>
        <!-- Inner hex -->
        <path d="M22 7 L34 14 L34 30 L22 37 L10 30 L10 14 Z" fill="url(#lg1)" opacity="0.08"/>
        <!-- H letter stylized as circuit paths -->
        <path d="M14 13 L14 31" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M30 13 L30 31" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M14 22 L30 22" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
        <!-- V accent inside H crossbar -->
        <path d="M18 17 L22 26 L26 17" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#glow)"/>
        <!-- Corner dots -->
        <circle cx="14" cy="13" r="2" fill="#00d4ff" opacity="0.9"/>
        <circle cx="30" cy="13" r="2" fill="#8b5cf6" opacity="0.9"/>
        <circle cx="14" cy="31" r="2" fill="#6366f1" opacity="0.9"/>
        <circle cx="30" cy="31" r="2" fill="#00d4ff" opacity="0.9"/>
      </svg>
      <span class="logo-name">HireVion</span>
    </div>

    <div class="card-title" id="card-title">Welcome back</div>
    <div class="card-sub" id="card-sub">Sign in to your HireVion workspace</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login',this)">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register',this)">Create Account</button>
    </div>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form id="form-login" method="POST" action="/login">
      <input type="hidden" name="action" value="login"/>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>

    <form id="form-register" method="POST" action="/login" style="display:none">
      <input type="hidden" name="action" value="register"/>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat your password" required/>
      </div>
      <button type="submit" class="btn-submit">Create Account →</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>

    <div class="features-strip">
      <span class="feat-pill">S-BERT</span>
      <span class="feat-pill">spaCy NER</span>
      <span class="feat-pill">XAI Scoring</span>
      <span class="feat-pill">Bias Audit</span>
    </div>
  </div>
</div>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none'
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none'
  document.getElementById('card-title').textContent = tab === 'login' ? 'Welcome back' : 'Create account'
  document.getElementById('card-sub').textContent   = tab === 'login'
    ? 'Sign in to your HireVion workspace'
    : 'Join HireVion and start screening smarter'
}

// ── Floating particles ─────────────────────────────────────────
;(function(){
  const c = document.getElementById('loginParticles')
  if(!c) return
  const colors = ['rgba(0,212,255,', 'rgba(99,102,241,', 'rgba(139,92,246,', 'rgba(16,185,129,']
  for(let i=0;i<30;i++){
    const p = document.createElement('div')
    p.className = 'lp'
    const size = Math.random()*3+1
    const col = colors[Math.floor(Math.random()*colors.length)]
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:-5px;background:${col}0.7);box-shadow:0 0 ${size*3}px ${col}0.5);animation-duration:${12+Math.random()*16}s;animation-delay:${Math.random()*14}s;`
    c.appendChild(p)
  }
})()

// ── Moving vertical lines ─────────────────────────────────────
;(function(){
  const c = document.getElementById('movingLines')
  if(!c) return
  for(let i=0;i<10;i++){
    const l = document.createElement('div')
    l.className = 'mline'
    const h = 80+Math.random()*160
    const col = Math.random()>.5 ? 'rgba(0,212,255,0.18)' : 'rgba(139,92,246,0.15)'
    l.style.cssText = `left:${Math.random()*100}%;height:${h}px;background:linear-gradient(to bottom,transparent,${col},transparent);animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`
    c.appendChild(l)
  }
})()

// ── 3D Cubes ──────────────────────────────────────────────────
;(function(){
  const configs = [
    {id:'loginCube1', s:64, col:'rgba(0,212,255,0.5)'},
    {id:'loginCube2', s:48, col:'rgba(139,92,246,0.5)'},
    {id:'loginCube3', s:36, col:'rgba(16,185,129,0.45)'},
  ]
  configs.forEach(({id,s,col})=>{
    const w = document.getElementById(id)
    if(!w) return
    const h = s/2
    const faces = [
      `rotateY(0deg) translateZ(${h}px)`,
      `rotateY(180deg) translateZ(${h}px)`,
      `rotateY(90deg) translateZ(${h}px)`,
      `rotateY(-90deg) translateZ(${h}px)`,
      `rotateX(90deg) translateZ(${h}px)`,
      `rotateX(-90deg) translateZ(${h}px)`,
    ]
    faces.forEach(tf=>{
      const d = document.createElement('div')
      d.className = 'cube-face'
      d.style.cssText = `width:${s}px;height:${s}px;top:0;left:0;transform:${tf};border:1px solid ${col};background:${col.replace('0.5','0.02').replace('0.45','0.02')};`
      w.appendChild(d)
    })
  })
})()

// ── Dot constellation ─────────────────────────────────────────
;(function(){
  const c = document.getElementById('dotField')
  if(!c) return
  for(let i=0;i<55;i++){
    const d = document.createElement('div')
    d.className = 'df'
    const col = Math.random()>.5 ? '#00d4ff' : '#8b5cf6'
    d.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s;`
    c.appendChild(d)
  }
})()

</script>
</body>
</html>
